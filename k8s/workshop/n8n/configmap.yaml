apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: workshop
data:
  # n8n base URL — uses ingress LB IP injected by setup
  N8N_HOST: "INJECT_N8N_HOST"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "http"
  N8N_PATH: "/n8n/"
  N8N_EDITOR_BASE_URL: "http://INJECT_N8N_HOST/n8n"
  WEBHOOK_URL: "http://INJECT_N8N_HOST/n8n/"
  N8N_USER_MANAGEMENT_DISABLED: "false"
  N8N_BASIC_AUTH_ACTIVE: "true"
  N8N_BASIC_AUTH_USER: "admin"
  N8N_BASIC_AUTH_PASSWORD: "INJECT_N8N_PASSWORD"
  # Gemini — set via n8n UI credentials, not here
  # Paths
  N8N_USER_FOLDER: "/home/node/.n8n"
  # MCP server — internal K8s service name (no IP needed)
  MCP_URL: "http://mcp-server.workshop.svc.cluster.local:8000"
  # Prometheus — LB hostname injected by setup
  PROMETHEUS_URL: "INJECT_PROMETHEUS_URL"
  # Dashboard chat webhook — internal
  DASHBOARD_URL: "http://clawops-dashboard.workshop.svc.cluster.local:80"
