apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  namespace: workshop
  labels:
    app: target-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: target-app
          image: yanivomc/target-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DASHBOARD_URL
              value: "http://clawops-dashboard.clawops.svc.cluster.local:80"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: target-app
  namespace: workshop
  labels:
    app: target-app
    workshop: "true"
spec:
  selector:
    app: target-app
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: target-app
  namespace: workshop
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: target-app
  endpoints:
    - port: "8080"
      interval: 15s
