apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawops-dashboard
  namespace: clawops
  labels:
    app: clawops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawops-dashboard
  template:
    metadata:
      labels:
        app: clawops-dashboard
    spec:
      containers:
        - name: dashboard
          image: yanivomc/clawops-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: dashboard-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: clawops-dashboard
  namespace: clawops
spec:
  selector:
    app: clawops-dashboard
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
