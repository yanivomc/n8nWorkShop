apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: clawops
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: n8n
          # Pinned: n8nio/n8n:latest rolled to 2.27.5 which ships a broken
          # editor index.html (0-byte templated cache → blank UI). 1.123.62 is
          # the latest 1.x stable and matches the node versions in n8n-workflows/.
          image: n8nio/n8n:1.123.62
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5678
          envFrom:
            - configMapRef:
                name: n8n-config
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            # n8n templates its ~1MB frontend bundles into .cache on startup.
            # On some EBS CSI volumes (kops-csi) a large single-file write gets
            # truncated at a 64KB boundary → the editor JS is cut off mid-file →
            # blank UI. The cache is regenerable (not real data), so keep it on a
            # node-local emptyDir, which handles big files fine. The SQLite DB
            # stays on the PVC (it writes in small pages, unaffected).
            - name: n8n-cache
              mountPath: /home/node/.n8n/.cache
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
        - name: n8n-cache
          emptyDir: {}
