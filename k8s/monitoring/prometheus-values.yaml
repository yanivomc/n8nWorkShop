# kube-prometheus-stack values — ClawOps Workshop
# All services ClusterIP — nginx ingress handles external access

# ── Prometheus ─────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    routePrefix: /prometheus
    externalUrl: http://INJECT_INGRESS_LB/prometheus
    retention: 24h
    resources:
      requests:
        memory: 400Mi
        cpu: 200m
      limits:
        memory: 800Mi
        cpu: 500m
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
  service:
    type: ClusterIP
    port: 9090

# ── Grafana ────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminUser: admin
  adminPassword: workshop123
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true
    security:
      allow_embedding: true
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: workshop
          orgId: 1
          folder: Workshop
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/workshop
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      pod-monitoring:
        gnetId: 6417
        revision: 1
        datasource: Prometheus

# ── Alertmanager ───────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
  service:
    type: ClusterIP
    port: 9093
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, namespace, pod]
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 12h
      receiver: null-receiver
      routes:
        - matchers:
            - workshop = "true"
          receiver: n8n-webhook
          group_wait: 5s
          repeat_interval: 12h
    receivers:
      - name: null-receiver
      - name: n8n-webhook
        webhook_configs:
          - url: "http://EC2_PUBLIC_IP_PLACEHOLDER:5678/webhook/prometheus-alert-s5"
            send_resolved: true

# ── Workshop Alert Rules ───────────────────────────────────────────────
additionalPrometheusRulesMap:
  workshop-alerts:
    groups:
      - name: workshop.pods
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 > 0
            for: 1m
            labels:
              severity: critical
              workshop: "true"
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} restarted {{ $value | humanizePercentage }} times/min"
          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: critical
              workshop: "true"
            annotations:
              summary: "Pod {{ $labels.pod }} OOMKilled"
              description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was killed — memory limit exceeded"
          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0
            for: 2m
            labels:
              severity: warning
              workshop: "true"
            annotations:
              summary: "Pod {{ $labels.pod }} not ready"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} not ready for 2+ minutes"
          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
            for: 3m
            labels:
              severity: warning
              workshop: "true"
            annotations:
              summary: "Deployment {{ $labels.deployment }} replica mismatch"
              description: "Expected vs available replicas mismatch for {{ $labels.deployment }} in {{ $labels.namespace }}"

      - name: workshop.target-app
        rules:
          - alert: TargetAppCPUStress
            expr: target_chaos_cpu_active{namespace="workshop"} == 1
            for: 10s
            labels:
              severity: warning
              workshop: "true"
            annotations:
              summary: "CPU stress active on {{ $labels.pod }}"
              description: "target-app pod {{ $labels.pod }} is running CPU stress scenario"
          - alert: TargetAppMemoryLeak
            expr: target_chaos_memory_active{namespace="workshop"} == 1
            for: 10s
            labels:
              severity: warning
              workshop: "true"
            annotations:
              summary: "Memory leak active on {{ $labels.pod }}"
              description: "target-app pod {{ $labels.pod }} is leaking memory"
          - alert: TargetAppMemoryCritical
            expr: target_chaos_memory_bytes{namespace="workshop"} > 400 * 1024 * 1024
            for: 10s
            labels:
              severity: critical
              workshop: "true"
            annotations:
              summary: "Memory leak critical on {{ $labels.pod }}"
              description: "target-app pod {{ $labels.pod }} allocated over 400MB"
          - alert: TargetAppCrashLooping
            expr: increase(kube_pod_container_status_restarts_total{namespace="workshop", pod=~"target-app.*"}[5m]) > 1
            for: 0s
            labels:
              severity: critical
              workshop: "true"
            annotations:
              summary: "target-app is crash looping"
              description: "Pod {{ $labels.pod }} restarted >1 time in 5 minutes"

      - name: workshop.target-app.errors
        rules:
          - alert: TargetAppHighErrorRate
            expr: target_chaos_error_active{namespace="workshop"} == 1
            for: 10s
            labels:
              severity: critical
              workshop: "true"
            annotations:
              summary: "High error rate on {{ $labels.pod }}"
              description: "target-app is returning errors"
          - alert: TargetAppHighLatency
            expr: target_chaos_latency_active{namespace="workshop"} == 1
            for: 10s
            labels:
              severity: warning
              workshop: "true"
            annotations:
              summary: "High latency on {{ $labels.pod }}"
              description: "target-app is injecting latency on all requests"

      - name: workshop.nodes
        rules:
          - alert: NodeMemoryPressure
            expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
            for: 1m
            labels:
              severity: critical
              workshop: "true"
            annotations:
              summary: "Node {{ $labels.node }} memory pressure"
              description: "Node {{ $labels.node }} is under memory pressure"
          - alert: NodeHighCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 2m
            labels:
              severity: warning
              workshop: "true"
            annotations:
              summary: "Node {{ $labels.instance }} CPU > 85%"
              description: "CPU usage on {{ $labels.instance }} has been above 85% for 2 minutes"
