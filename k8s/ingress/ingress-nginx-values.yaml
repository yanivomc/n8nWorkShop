controller:
  replicaCount: 1
  service:
    type: LoadBalancer
    annotations:
      # AWS NLB — single LB for all services
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  config:
    # Allow large payloads (n8n workflow imports)
    proxy-body-size: "50m"
    # WebSocket support (n8n + SSE for dashboard chat)
    proxy-read-timeout: "3600"
    proxy-send-timeout: "3600"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
