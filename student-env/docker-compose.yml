version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${EC2_PUBLIC_IP}:5678
      - GENERIC_TIMEZONE=Asia/Jerusalem
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mcp-server
    networks:
      - workshop

  mcp-server:
    build: ../mcp-server
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL}
      - WRITE_APPROVAL_TOKEN=${WRITE_APPROVAL_TOKEN}
    volumes:
      - ${KUBECONFIG_PATH}:/root/.kube/config:ro
    networks:
      - workshop

volumes:
  n8n_data:

networks:
  workshop:
    driver: bridge
