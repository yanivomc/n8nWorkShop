version: '3.8'

# CLUSTER_HOST and MASTER_IP are set automatically by setup.sh into .env
# They solve the kops private DNS problem by injecting /etc/hosts into containers

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${EC2_PUBLIC_IP}:5678
      - GENERIC_TIMEZONE=Asia/Jerusalem
      - N8N_SECURE_COOKIE=false
      # ── Skip onboarding / telemetry ──────────────────────────
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_HIDE_USAGE_PAGE=true
      # ── Owner pre-configured (avoids setup wizard) ────────────
      - N8N_EMAIL=${N8N_EMAIL:-admin@workshop.local}
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      # ── Community nodes (allow install) ──────────────────────
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "${CLUSTER_HOST}:${MASTER_IP}"
    depends_on:
      - mcp-server
    networks:
      - workshop

  mcp-server:
    build: ../mcp-server
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL}
      - WRITE_APPROVAL_TOKEN=${WRITE_APPROVAL_TOKEN}
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ${KUBECONFIG_PATH:-~/.kube/config}:/root/.kube/config:ro
    extra_hosts:
      - "${CLUSTER_HOST}:${MASTER_IP}"
    networks:
      - workshop

volumes:
  n8n_data:

networks:
  workshop:
    driver: bridge
