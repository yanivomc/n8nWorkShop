apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
  namespace: workshop
  labels:
    app: target-app
    workshop: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
        workshop: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: target-app
          image: yanivomc/target-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APP_NAME
              value: "target-app"
            - name: DASHBOARD_URL
              value: "http://clawops-dashboard-internal.workshop.svc.cluster.local"
            - name: SKIP_REGISTRATION
              value: "false"
            - name: PUBLIC_URL
              value: ""   # set to http://<EC2_IP>:30080 by setup.sh option 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "2"        # allow CPU stress to be visible
              memory: "1Gi"   # allow memory leak to be visible
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: target-app
  namespace: workshop
  labels:
    app: target-app
spec:
  type: NodePort
  selector:
    app: target-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: target-app-lb
  namespace: workshop
  labels:
    app: target-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: target-app
  ports:
    - port: 8080
      targetPort: 8080
      name: http
