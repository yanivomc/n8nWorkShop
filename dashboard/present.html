/* ---------- tiny syntax highlighter (lang-agnostic, safe) ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(code){
  // single pass — alternation classifies each token; injected HTML is never re-scanned
  return esc(code).replace(
    /(#.*$|\/\/.*$)|("[^"\n]*"|'[^'\n]*')|\b(def|class|return|if|not|in|for|try|except|raise|await|async|import|from|const|let|true|false|True|False|None|POST|GET|PATCH|DELETE)\b|\b(\d+(?:\.\d+)?)\b/gm,
    (m,cm,st,kw,nu)=>{
      if(cm)return '<span class="c">'+cm+'</span>';
      if(st)return '<span class="s">'+st+'</span>';
      if(kw)return '<span class="k">'+kw+'</span>';
      if(nu)return '<span class="n">'+nu+'</span>';
      return m;
    });
}

/* ---------- render ---------- */
const SVGNS='http://www.w3.org/2000/svg';
let current='agent', playTimer=null, playing=false;
const nodeIndex={};

function el(tag,attrs){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
function anchor(n,side){ // returns [x,y] on node edge
  const cx=n.x+n.w/2, cy=n.y+n.h/2;
  if(side==='r')return[n.x+n.w,cy]; if(side==='l')return[n.x,cy];
  if(side==='t')return[cx,n.y]; if(side==='b')return[cx,n.y+n.h]; return[cx,cy];
}
function edgePath(a,b){
  const A=nodeIndex[a], B=nodeIndex[b];
  const ac=[A.x+A.w/2,A.y+A.h/2], bc=[B.x+B.w/2,B.y+B.h/2];
  const horiz=Math.abs(bc[0]-ac[0])>=Math.abs(bc[1]-ac[1]);
  let p1,p2;
  if(horiz){ p1=anchor(A, bc[0]>=ac[0]?'r':'l'); p2=anchor(B, bc[0]>=ac[0]?'l':'r'); }
  else { p1=anchor(A, bc[1]>=ac[1]?'b':'t'); p2=anchor(B, bc[1]>=ac[1]?'t':'b'); }
  const mx=(p1[0]+p2[0])/2, my=(p1[1]+p2[1])/2;
  // gentle curve
  return {d:`M${p1[0]},${p1[1]} Q ${mx},${p1[1]} ${mx},${my} T ${p2[0]},${p2[1]}`, mid:[mx,my]};
}

function renderFlow(key){
  const flow=FLOWS[key]; const svg=document.getElementById('svg-'+key);
  svg.innerHTML='';
  flow.nodes.forEach(n=>nodeIndex[n.id]=n);
  // edges first (under nodes)
  flow.edges.forEach((e,i)=>{
    const[a,b,lab]=e; const pth=edgePath(a,b); const id=`${key}-edge-${i}`;
    const path=el('path',{d:pth.d,class:'edge',id});
    path.dataset.a=a; path.dataset.b=b; svg.appendChild(path);
    // flowing dot
    const dot=el('circle',{r:4,class:'flowdot'});
    const am=el('animateMotion',{dur:(2.2+ (i%3)*0.4)+'s',repeatCount:'indefinite',rotate:'auto'});
    const mp=el('mpath'); mp.setAttributeNS('http://www.w3.org/1999/xlink','href','#'+id); am.appendChild(mp);
    dot.appendChild(am); svg.appendChild(dot);
    if(lab){const t=el('text',{x:pth.mid[0],y:pth.mid[1]-7,class:'elabel','text-anchor':'middle'});t.textContent=lab;svg.appendChild(t);}
  });
  // nodes
  flow.nodes.forEach(n=>{
    const g=el('g',{class:'node '+(n.accent||''),id:`${key}-node-${n.id}`}); g.dataset.id=n.id;
    g.appendChild(el('rect',{x:n.x,y:n.y,width:n.w,height:n.h,rx:12,class:'box'}));
    const ic=el('text',{x:n.x+16,y:n.y+(n.big?34:30),class:'ico'}); ic.innerHTML=n.icon; g.appendChild(ic);
    const lb=el('text',{x:n.x+(n.big?46:42),y:n.y+(n.big?32:27),class:'lbl'}); lb.textContent=n.label; g.appendChild(lb);
    const sb=el('text',{x:n.x+(n.big?46:42),y:n.y+(n.big?50:44),class:'sub'}); sb.textContent=n.sub; g.appendChild(sb);
    g.addEventListener('click',()=>{stopPlay();openNode(n.id);});
    svg.appendChild(g);
  });
}

/* ---------- panel ---------- */
function openNode(id){
  const n=nodeIndex[id]; if(!n)return;
  highlight(id);
  document.getElementById('pTag').textContent=n.tag||'';
  document.getElementById('pTitle').textContent=n.title||n.label;
  let facts=(n.facts||[]).map(f=>`<li><b>${f[0]}</b><span>${f[1]}</span></li>`).join('');
  document.getElementById('pBody').innerHTML=
    `<div class="p-desc">${n.desc||''}</div>`+
    (facts?`<ul class="p-facts">${facts}</ul>`:'')+
    (n.code?`<div class="code-h">${n.codeH||'code'}</div><pre><code>${hl(n.code)}</code></pre>`:'');
  document.getElementById('panel').classList.add('open');
  document.querySelector('.stage-wrap').classList.add('shift');   // reflow diagram so panel never covers nodes
}
function closePanel(){document.getElementById('panel').classList.remove('open');
  document.querySelector('.stage-wrap').classList.remove('shift');clearHot();}

/* ---------- highlight ---------- */
function clearHot(){document.querySelectorAll('.node').forEach(g=>g.classList.remove('hot','dim'));
  document.querySelectorAll('.edge').forEach(e=>e.classList.remove('lit'));}
function highlight(id){
  const svg=document.getElementById('svg-'+current);
  svg.querySelectorAll('.node').forEach(g=>{g.classList.toggle('hot',g.dataset.id===id);g.classList.toggle('dim',g.dataset.id!==id);});
  svg.querySelectorAll('.edge').forEach(e=>e.classList.toggle('lit', e.dataset.a===id||e.dataset.b===id));
}

/* ---------- play mode ---------- */
function startPlay(){
  stopPlay(); closePanel();           // keep the FULL diagram visible during the walkthrough
  playing=true; document.getElementById('playBtn').disabled=true;
  const steps=FLOWS[current].play; let i=0;
  const cap=document.getElementById('caption'); cap.classList.add('show');
  const tick=()=>{
    if(i>=steps.length){ document.getElementById('capStep').textContent='✓ done';
      document.getElementById('capTxt').innerHTML='That’s the full flow. <b style="color:var(--cyan)">Click any node</b> to dive into its code, or RESET.';
      playing=false; document.getElementById('playBtn').disabled=false; return; }
    const[id,txt]=steps[i];
    const n=nodeIndex[id];
    document.getElementById('capStep').textContent=`${i+1}/${steps.length}`;
    // caption carries the narration (no side panel → nothing covers the diagram)
    document.getElementById('capTxt').innerHTML=`<b style="color:var(--cyan)">${n?n.label:''}</b> &nbsp;${txt}`;
    highlight(id);
    i++; playTimer=setTimeout(tick,2600);
  };
  tick();
}
function stopPlay(){if(playTimer){clearTimeout(playTimer);playTimer=null;}playing=false;document.getElementById('playBtn').disabled=false;}
function reset(){stopPlay();clearHot();closePanel();
  document.getElementById('caption').classList.remove('show');}

/* ---------- tabs + wiring ---------- */
function switchFlow(key){
  current=key; reset();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.flow===key));
  document.querySelectorAll('svg.stage').forEach(s=>s.classList.toggle('active',s.id==='svg-'+key));
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchFlow(t.dataset.flow)));
document.getElementById('playBtn').addEventListener('click',startPlay);
document.getElementById('resetBtn').addEventListener('click',reset);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();if(e.key===' '){e.preventDefault();playing?stopPlay():startPlay();}});

renderFlow('agent'); renderFlow('incident');
</script>
</body>
